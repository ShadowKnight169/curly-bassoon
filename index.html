<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1e66ff" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<title>CDL Offline Quiz</title>
<style>
:root{
  --blue:#1e66ff; --bg:#f7f8fb; --card:#fff; --text:#0f172a; --muted:#64748b;
  --border:#e5e7eb; --green:#16a34a; --red:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text)}
.wrap{max-width:780px;margin:0 auto;padding:12px 10px 24px}
.top{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.pillbtn{border:1px solid var(--border);background:#eee;color:#111;padding:8px 12px;border-radius:999px;font-weight:700;font-size:13px}
.metaPill{border:1px solid var(--border);background:#fff;padding:8px 12px;border-radius:999px;color:#111;font-weight:700;font-size:13px}
.seed{margin-top:10px;display:inline-flex;border:1px solid var(--border);background:#fff;padding:7px 10px;border-radius:999px;color:var(--muted);font-weight:700;font-size:14px}
.notes{margin-top:8px;color:#475569;line-height:1.32;font-size:13px}
.statusCard{margin-top:10px;border:1px solid var(--border);background:var(--card);border-radius:16px;padding:9px}
.statusRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;width:100%}
.statusPill{border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:#fff;color:#111;font-weight:800;font-size:13px}
.toggleWrap{display:flex;align-items:center;gap:14px;flex-wrap:nowrap;width:100%}
.toggleLabel{font-weight:700;color:#111;flex:0 0 auto;white-space:nowrap}
.switch{position:relative;flex:1 1 auto;width:auto;min-width:0;height:40px;border-radius:999px;background:#fff;border:1px solid var(--border);padding:4px;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;overflow:hidden}
.switchTrack{position:absolute;inset:4px;border-radius:999px;background:#f1f5f9}
.switchKnob{position:absolute;top:4px;left:4px;width:calc((100% - 8px)/3);height:32px;border-radius:999px;background:var(--blue);transition:transform .18s ease}
.switchText{position:relative;width:auto;text-align:center;z-index:2;font-weight:700;font-size:12px;user-select:none;display:flex;align-items:center;justify-content:center;white-space:nowrap;background:transparent;border:0;padding:0 6px;appearance:none;-webkit-appearance:none}
.switchText.active{color:white}
.switchText.inactive{color:#0f172a}
.qCard{margin-top:12px;border:1px solid var(--border);background:var(--card);border-radius:16px;padding:14px}
h1{margin:0 0 10px;font-size:22px;line-height:1.22;letter-spacing:-0.01em;font-weight:800;min-height:3.7em}
.qimg{margin:10px 0 14px;width:100%;max-width:520px;border-radius:12px;border:1px solid var(--border);display:none}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{border:1px solid var(--border);border-radius:14px;padding:11px 12px;background:#fff;text-align:left;font-size:15px;line-height:1.28;color:var(--blue);font-weight:700}
.choice:disabled{opacity:1}
.choice.correct{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.08);color:var(--green)}
.choice.wrong{border-color:rgba(220,38,38,.35);background:rgba(220,38,38,.08);color:var(--red)}
.bottomRow{margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.nextBtn{border:0;border-radius:999px;padding:11px 16px;font-weight:900;background:#e5e7eb;color:#9ca3af;font-size:15px}
.nextBtn.enabled{background:var(--blue);color:#fff}
.msg{color:#6b7280;font-weight:700}
.error{margin-top:10px;color:var(--red);font-weight:800;white-space:pre-wrap}

.selectorCard{margin-top:10px;border:1px solid var(--border);background:var(--card);border-radius:16px;padding:12px}
.selectorGroup{display:flex;align-items:center;gap:10px;width:100%}
.selectorGroup + .selectorGroup{margin-top:10px}
.selectorLabel{font-weight:800;color:#111;flex:0 0 auto;white-space:nowrap;font-size:18px;line-height:1}
.selectorButtons{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;flex:1 1 auto;min-width:0;padding:3px;background:#eef1f7;border:2px solid #d9dde6;border-radius:999px}
.selectorBtn{border:0;background:transparent;color:#0f172a;padding:10px 8px;min-height:42px;border-radius:999px;font-weight:700;font-size:14px;line-height:1.02;text-align:center;appearance:none;-webkit-appearance:none}
.selectorBtn.active{background:#3b66f5;color:#fff}
@media (max-width:420px){.selectorLabel{font-size:17px}.selectorGroup{gap:8px}.selectorGroup + .selectorGroup{margin-top:8px}.selectorButtons{gap:2px;padding:2px}.selectorBtn{font-size:13px;padding:9px 6px;min-height:38px}}
@media (max-width:420px){
  h1{font-size:20px;min-height:4.1em}
  .choice{font-size:14px}
  .toggleWrap{gap:10px}
}


.descriptionText{
  width:100%;
  font-size:14px;
  line-height:1.35;
  font-weight:800;
  color:#111;
  text-align:center;
}

</style>

</head>
<body>
<div class="wrap">
  <div class="top">
    <button id="newTestBtn" class="pillbtn">New 50-Question Test</button>
    <div class="metaPill" id="bankMeta">Bank: — | Test: 50</div>
  </div>

  <div class="seed" id="seedPill">Seed: —</div>

  <div class="notes">
    
  </div>

  <div class="selectorCard">
    <div class="selectorGroup">
      <span class="selectorLabel">Test:</span>
      <div class="selectorButtons">
        <button class="selectorBtn active" id="switchGeneral" type="button">General</button>
        <button class="selectorBtn" id="switchAir" type="button">Air Brakes</button>
        <button class="selectorBtn" id="switchCombo" type="button">Combinations</button>
      </div>
    </div>
    <div class="selectorGroup">
      <span class="selectorLabel">Endorsements:</span>
      <div class="selectorButtons">
        <button class="selectorBtn" id="switchHazmat" type="button">HazMat</button>
        <button class="selectorBtn" id="switchDoubles" type="button">D&amp;T</button>
        <button class="selectorBtn" id="switchTanker" type="button">Tanker</button>
      </div>
    </div>
  </div>

  
  <div class="statusCard" id="descriptionCard">
    <div class="statusRow">
      <div class="descriptionText" id="testDescription"></div>
    </div>
  </div>

  <div class="statusCard">

    <div class="statusRow">
      <div class="statusPill" id="qCount">Question: 1 / 50</div>
    </div>
    <div id="error" class="error" style="display:none"></div>
  </div>

  <div class="qCard">
    <h1 id="qText">Loading...</h1>
    <img id="qImg" class="qimg" alt="Question image" />
    <div class="choices" id="choices"></div>
    <div class="bottomRow">
      <button id="nextBtn" class="nextBtn" disabled>Next</button>
      <div class="msg" id="msg">Select an answer.</div>
    </div>
  </div>
</div>

<script>
(() => {
  const DATA = {"general":{"label":"CDL General","short":"General","testSize":50,"passNeeded":40,"questions":[{"id":1,"question":"Which of these is a good thing to remember about drinking alcohol?","choices":["The driver can control how fast the body gets rid of alcohol","Small quantities of alcohol improve reaction time","Alcohol first affects judgment and self-control"],"answerIndex":2},{"id":2,"question":"Which of these is not a good rule to follow when caring for an injured person at a collision?","choices":["If a qualified person is helping them, stay out of the way unless asked to assist","Move severely injured person(s) if a danger exists","Keep injured person(s) cool"],"answerIndex":2},{"id":3,"question":"Which of these statements is true about medicines used to treat the common cold?","choices":["It can be used while driving if you only take half the regular dosage","It should only be used when driving in daytime","It often makes you sleepy and thus should not be used while driving"],"answerIndex":2},{"id":4,"question":"The total weight of a powered unit, the trailer, and the cargo is called:","choices":["Gross vehicle weight","Gross combination weight","Gross axle weight"],"answerIndex":1},{"id":5,"question":"Which piece of emergency equipment should be in your vehicle?","choices":["Circuit breakers","First aid kit","Warning devices for parked vehicles"],"answerIndex":2},{"id":6,"question":"Which of these statements is true about causes of vehicle fires?","choices":["Under-inflated tires will NOT cause a vehicle fire","Carrying a properly charged fire extinguisher will help prevent fires","Poor trailer ventilation can cause flammable cargo to catch on fire"],"answerIndex":2},{"id":7,"question":"Brake “fade” can be:","choices":["Caused by the brakes getting very hot","Corrected by letting up on the brakes for 1-2 seconds and then reapplying them","Caused by very cold weather"],"answerIndex":0},{"id":8,"question":"Which of these statements is true about vehicle fires?","choices":["If the cargo or box trailer catches on fire, open the doors as soon as you can","If your engine is on fire, open the hood as soon as you can","A burning tire should be cooled with water"],"answerIndex":2},{"id":9,"question":"Which of these statements is true about brakes?","choices":["Brakes absorb more heat to stop heavier vehicles","Brake drums cool very quickly when the vehicle is moving very fast","Brake fade is not caused by heat"],"answerIndex":0},{"id":10,"question":"Which of the following do not provide extra gears on some trucks?","choices":["Automatic transmissions","Auxiliary transmissions","Multi-speed rear axles"],"answerIndex":0},{"id":11,"question":"You are starting your vehicle in the motion from a stop. As you apply power to the drive wheels, they start to spin. You should:","choices":["Take your foot off the accelerator","Take your foot off the accelerator and apply the brakes","Try a lower gear"],"answerIndex":0},{"id":12,"question":"You wish to turn right from a two-lane, two-way street onto another. Your vehicle is so long that you must swing wide to complete the turn. Which of these figures show how you should make the turn?","choices":["Figure A","Figure B","Figure C"],"answerIndex":1,"image":"assets/q12_diagram.png"},{"id":13,"question":"Which of these statements is true about downshifting?","choices":["Downshift before you enter the curve","Let the rpm decrease while the clutch is released and the shift lever is in neutral","Downshift just after you enter the curve"],"answerIndex":0},{"id":14,"question":"Which of these is NOT a danger when an automatic transmission is forced into a lower gear at a high speed?","choices":["Damage to the transmission","Loss of engine braking effect","Loss of steering control"],"answerIndex":2},{"id":15,"question":"Which of these statements is true about backing a heavy vehicle?","choices":["You should avoid backing whenever you can","Helpers should be out of sight and use only verbal signals to communicate with the driver","It’s safer to back toward the right side of the vehicle"],"answerIndex":0},{"id":16,"question":"The distance that you should look ahead of your vehicle while driving is about ____ mile at highway speeds:","choices":["1/8","1/4","1/2"],"answerIndex":1},{"id":17,"question":"The distance that you should look ahead of your vehicle while driving is ____ at low speeds:","choices":["1/2 block","1 block","2 blocks"],"answerIndex":1},{"id":18,"question":"The Commercial Driver Handbook suggests several things to do when you pass a vehicle. Which of these is NOT one of them?","choices":["Lightly tap your horn, if needed","At night, turn on your high beams while you pass the vehicle","Assume the other driver does not see you"],"answerIndex":1},{"id":19,"question":"Use your vehicle’s horn when:","choices":["A car is in your way","It may help avoid a crash","You want to change lanes"],"answerIndex":1},{"id":20,"question":"Which of these statements is true about speed management?","choices":["Shady parts of the road allow better traction than open areas","Road surfaces will freeze before bridges","On slippery roads, it takes longer to stop and it is harder to turn without skidding"],"answerIndex":2},{"id":21,"question":"You are driving a 40-foot vehicle at 35mph. The road is dry and visibility is good. What is the least number of seconds in space that you should keep in front of your vehicle to be safe?","choices":["3 seconds","4 seconds","5 seconds"],"answerIndex":1},{"id":22,"question":"Which of these is a good thing to do when driving at night?","choices":["Drive slowly enough to stop within the range of your headlights","Look directly at oncoming headlights only for a brief moment","Keep your instrument lights bright"],"answerIndex":0},{"id":23,"question":"Which of these is NOT something you should do if your headlights are not working properly?","choices":["Leave your high beams on","Clean the headlights","Adjust the headlights"],"answerIndex":0},{"id":24,"question":"You should avoid driving through deep puddles or flowing water. In the event that you cannot avoid the situation, which of these steps can help keep your brakes working?","choices":["Pressing both the brake pedal and accelerator firmly after coming out of the water","Gently putting on the brakes while driving through the water","Turning on your brake heaters"],"answerIndex":1},{"id":25,"question":"Which of these is true about the radiator shutters and the winter front?","choices":["The winter front should be closed tightly","You should remove ice from the radiator shutters","The engine may overheat if the winter front is left open"],"answerIndex":1},{"id":26,"question":"Which of these statements is NOT true about engine belts in hot weather?","choices":["Cracking is likely to occur but is not a safety threat","You can check the tightness of the belts by pressing on them","Loose belts will not turn the water pump and/or fan on properly"],"answerIndex":0},{"id":27,"question":"What should you do when you see a hazard in the roadway?","choices":["Swerve around it and get back in your lane","Stop quickly and pull to the side of the road","Use your 4-way flashers or brake lights to warn others"],"answerIndex":2},{"id":28,"question":"Truck escape ramps:","choices":["Help avoid damage to vehicles","Cannot be used by certain types of heavy vehicles","Are not for buses"],"answerIndex":0},{"id":29,"question":"Which of these statements is a good rule to remember when your vehicle is in a traffic emergency and may collide with another vehicle?","choices":["You can almost always turn to miss an obstacle more quickly than you can stop","Stopping is always the safest action in a traffic emergency","Leaving the road is always riskier in a traffic emergency"],"answerIndex":0},{"id":30,"question":"Your vehicle has hydraulic brakes. While traveling on a level road, you press the brake pedal and find that it goes to the floor. Which of these statements is true?","choices":["The parking brake will not work because it is part of the same hydraulic system","Pumping the brake will generate enough pressure to stop the vehicle","Shifting into neutral will help slow the vehicle"],"answerIndex":1},{"id":31,"question":"Hydroplaning:","choices":["Occurs when there is a lot of water","Cannot occur when driving through a puddle","Is more likely to occur if tire pressure is low"],"answerIndex":2},{"id":32,"question":"Most serious skids result from:","choices":["Turning too sharply","Having an uneven load","Driving too fast for conditions"],"answerIndex":2},{"id":33,"question":"Which of these statements is true about cargo loading?","choices":["The legal maximum weight allowed by a state considered safe for all driving conditions","State laws dictate legal weight limits","If cargo is loaded by the shipper, the driver is not responsible for overloading"],"answerIndex":1},{"id":34,"question":"Which of these statements is true about tires?","choices":["You should inspect your tires every two hours or every 100 miles when driving in very hot weather","The air pressure of a tire decreases as the temperature of the tire increases","If the tires are too hot to the touch, release 5-10 pounds of air pressure to cool them down"],"answerIndex":0},{"id":35,"question":"You are checking your steering and exhaust systems in a pre-trip inspection. Which of these problems should be fixed before the vehicle is driven?","choices":["Oil on the tie rod","Grey smoke from the exhaust pipe","Steering wheel play of more than 10 degrees (2 inches on a 20-inch wheel)"],"answerIndex":2},{"id":36,"question":"Which of these statements is true about shipping hazardous materials?","choices":["A four-inch, circular, red hazardous material label must be on the container","Gas cylinders that will not hold a label must be shipped under container","A four-inch, diamond-shaped, hazardous materials label must be on the container"],"answerIndex":2},{"id":37,"question":"One can recognize hazardous materials by looking at the container’s:","choices":["Label","Shape","Color"],"answerIndex":0},{"id":38,"question":"You must stop on a hill or curve on a two-lane, two-way road. How far back should you place your reflective triangles?","choices":["Within 250 feet behind the vehicle","Within 500 feet behind the vehicle","As far back as necessary, so others can see your vehicle"],"answerIndex":1},{"id":39,"question":"You are driving a new truck with a manual transmission. What gear will you probably have to use to take a long, steep downhill grade?","choices":["The same gear than you would use to climb the hill","A lower gear than you would use to climb the hill","A higher gear than you would use to climb the hill"],"answerIndex":1},{"id":40,"question":"To help you stay alert while driving, you should:","choices":["Take short breaks before you are drowsy","Schedule trips for hours that you are normally asleep","Keep the cab warm and quiet"],"answerIndex":0},{"id":41,"question":"Which of these is true about hours of service?","choices":["You must take a break after every 2 hours of driving","After 1,000 hours you will be exempt from certain regulations","You should balance your hours of service with enough sleep to keep you alert"],"answerIndex":2},{"id":42,"question":"Which of the following is true about preventing fatigue on a long trip?","choices":["Stop periodically for rest and exercise","Keep the vehicle closed and heated","Take an over-the-counter stimulant"],"answerIndex":0},{"id":43,"question":"You will be placed out-of-service for 24 hours if your blood alcohol concentration (BAC) is:","choices":["At least 0.2%","At least 0.4%","Any detectable amount below 0.4%"],"answerIndex":2},{"id":44,"question":"Which fires can you use water on?","choices":["Tire","Gasoline","Electrical"],"answerIndex":0},{"id":45,"question":"Which of these statements is true about warning other drivers of a stopped vehicle?","choices":["Move the rear reflective triangle back if the driver’s vision is obscured within 500 feet","Keep the vehicle’s taillight on to warn other drivers","Put out your emergency warning devices within 5 minutes"],"answerIndex":0},{"id":46,"question":"Which of these statements is true about engine overheating?","choices":["Never shut off an overheated engine until it cools","Never remove the radiator cap on a pressurized system until the system has cooled","Antifreeze is not needed when the weather is warm"],"answerIndex":1},{"id":47,"question":"For your safety, when you place your reflective triangles you should:","choices":["Carry the triangles at your side","Hold the triangles with the reflective side facing towards the oncoming traffic","Keep them out of sight until you get to the location where you will place them"],"answerIndex":1},{"id":48,"question":"Retarders:","choices":["Allow you to disconnect the steering axle brakes","Can cause the drive wheels to skid when they have poor traction","Can not be used on interstate highways"],"answerIndex":1},{"id":49,"question":"Which of the following is not a type of retarder?","choices":["Electric","Hydraulic","Robotic"],"answerIndex":2},{"id":50,"question":"What is the proper way to hold a steering wheel?","choices":["Both hands close together, near the top of the wheel","Both hands close together, near the bottom of the wheel","Both hands, on opposite sides of the wheel"],"answerIndex":2},{"id":51,"question":"You are driving a long vehicle that makes wide turns. You want to make a left turn from Elm Street onto Oak Street. There are two left turn lanes (marked “A” and “B”) on Elm Street, and Oak Street is a four-lane street with two lanes in each direction. You should:","choices":["Use left turn lane “A”","Use left turn lane “B”","Start in left turn lane “A” and swing into left turn lane “B” just before entering the intersection"],"answerIndex":1},{"id":52,"question":"Which of these statements is true about double-clutching and shifting?","choice vement. About how much total stopping distance will you need to bring it to a stop?","choices":["Twice the length of the vehicle","Half the length of a football field","The length of a football field"],"answerIndex":2},{"id":61,"question":"Which of these statements is true about overhead clearance?","choices":["You should assume posted clearance signs are correct","The weight of a vehicle changes its height","If the road surface causes your vehicle to tilt toward the edge of the road, you should drive close to the shoulder"],"answerIndex":1},{"id":62,"question":"What should you do if a car coming towards you at night keeps its high beams on?","choices":["Flash your high beams at the other driver","Look to the right edge of your lane or right side of the road","Slow down and look straight ahead in your lane"],"answerIndex":1},{"id":63,"question":"The road you are driving on becomes very slippery due to ice. Which of these is a good thing to do?","choices":["Stop driving as soon as you can safely do so","Downshift to stop","Keep varying your speed by accelerating and braking"],"answerIndex":0},{"id":64,"question":"Which of these statements is true about cold weather driving?","choices":["An engine cannot overheat when the weather is very cold","Windshield washer antifreeze should be used","Exhaust system leaks are less dangerous in cold weather"],"answerIndex":1},{"id":65,"question":"Which of these statements is true about your tires in hot weather?","choices":["You should check tire mounting and air pressure before driving","If the tire is too hot to the touch, you should hose it down with water","A small amount of air should be let out so air pressure remains steady"],"answerIndex":0},{"id":66,"question":"When driving through roadway work zones, you should:","choices":["Reduce speed only if workers are close to roadway","Turn on your parking lights","Watch for sharp pavement drop-offs"],"answerIndex":2},{"id":67,"question":"When you must leave the road to avoid a hazard or emergency, you should keep in mind that:","choices":["Most shoulders are not strong enough to support the weight of a large vehicle","It is less dangerous to drive onto the shoulder than to risk a collision","You may be unable to re-enter the road"],"answerIndex":1},{"id":68,"question":"What should you do when your vehicle hydroplanes?","choices":["Start stab braking","Release the accelerator","Accelerate slightly"],"answerIndex":1},{"id":69,"question":"Which of these statements is important to remember about emergency braking?","choices":["Disconnecting the steering axle brakes will help keep your vehicle in a straight line","If the wheels are skidding, you cannot control the vehicle","Never do it without downshifting first"],"answerIndex":1},{"id":70,"question":"Which of these is a good thing to do when you steer to avoid a crash?","choices":["Apply the brakes while turning","Avoid counter steering","Don’t turn the steering wheel any more than needed"],"answerIndex":2},{"id":71,"question":"Which of these happens when a tire blows out at highway speeds?","choices":["A vibrating feeling","A hissing sound","A rapid drop in speed to less than 20mph"],"answerIndex":0},{"id":72,"question":"To correct a drive-wheel braking skid, you should:","choices":["Stop braking","Stop braking, turn quickly, and counter steer","Increase braking, turn quickly, and counter steer"],"answerIndex":0},{"id":73,"question":"Which of these statements is true about cargo loads?","choices":["Unstable loads (e.g., hanging meat, and livestock) require extra caution on curves","Oversize loads can be transported with special permits when roads are not busy","Tank vehicles used to transport liquids should always be fully loaded"],"answerIndex":0},{"id":74,"question":"Where or how is cargo blocking used?","choices":["Loosely around the cargo","From the upper part of the cargo to the floor","In the front, back, and/or sides of the cargo"],"answerIndex":2},{"id":75,"question":"Which of these is not a part of the engine compartment during a pre-trip inspection?","choices":["Engine oil level","Valve clearance","Checking for worn electrical wiring insulation"],"answerIndex":1},{"id":76,"question":"You are checking your tires during a pre-trip inspection. Which of these statements is true?","choices":["Tires of mismatched size should not be used on the same vehicle","Radial and bias-ply tires can be used together on the same vehicle","A 2/32-inch tread depth is safe for the front tires"],"answerIndex":0},{"id":77,"question":"What is the most important reason to inspect your truck or bus?","choices":["Safety","It’s the law","To avoid being cited"],"answerIndex":0},{"id":78,"question":"If you do not have a Hazmat endorsement on your Commercial Driver License, you may drive a vehicle transporting hazardous materials when:","choices":["The GVWR is 26,001 pounds or less","The vehicle does not require placards","A person with a Hazmat endorsement rides with you"],"answerIndex":1},{"id":79,"question":"Where must you keep shipping papers when transporting hazardous materials?","choices":["Under the driver’s seat","In a pouch on the driver’s door or on the seat","In the glove compartment, which must be locked"],"answerIndex":1},{"id":80,"question":"You are driving a heavy vehicle with a manual transmission. You have to stop the vehicle on the shoulder while driving on an uphill grade. Which of these is a good rule to follow when putting the vehicle back in motion?","choices":["Keep the clutch slipping while slowly accelerating","Use the parking brake to hold the vehicle until the clutch engages","Let the vehicle roll backwards a few feet before engaging the clutch"],"answerIndex":1},{"id":81,"question":"To prevent brake “fade”, you should:","choices":["Select a gear which will keep your vehicle to a safe speed on steep downgrades","Apply constant hard pressure on the brakes when driving downhill","Coast down hills that do not have very steep inclines"],"answerIndex":0 ser than they really are","Show a wider area than flat mirrors show"],"answerIndex":2},{"id":90,"question":"The purpose of retarders is to:","choices":["Help slow the vehicle down while driving and reduce brake wear","Apply extra braking power to the non-drive axles","Help prevent skids and reduce brake wear"],"answerIndex":0},{"id":91,"question":"The braking effect of the engine is greatest when the engine is ____ the governed RPMs and the transmission is in the ____ gears:","choices":["Above, lower","Below, higher","Near, lower"],"answerIndex":2},{"id":92,"question":"What is counter steering?","choices":["Turning the steering wheel counterclockwise to prevent oversteering","Using the steering axle brakes to prevent over steering","Turning the steering wheel back in the other direction after steering to avoid traffic emergency"],"answerIndex":2},{"id":93,"question":"What is the term for a commercial vehicle’s habit of swinging wide on turns?","choices":["Off tracking","Wide-rounding","Side winding"],"answerIndex":0},{"id":94,"question":"It’s important to shift gears correctly to keep:","choices":["Control of the vehicle","The engine warm","The engine oil flowing"],"answerIndex":0},{"id":95,"question":"Which of these is NOT a danger when an automatic transmission is forced into a lower gear at high speed?","choices":["Damage to the transmission","Loss of engine braking effect","Loss of steering control"],"answerIndex":2},{"id":96,"question":"You should signal continuously while turning because:","choices":["You need both hands on the wheel to turn safely","It is illegal to turn off your signal before completing a turn","Most vehicles have self-canceling signals"],"answerIndex":0},{"id":97,"question":"When approaching a traffic light that has been green for a long time, you should:","choices":["Accelerate so you get through the light","Start slowing down so you will be ready to stop","Continue at your current speed"],"answerIndex":1},{"id":98,"question":"Which of these is a good thing to remember when crossing or entering traffic with a heavy vehicle?","choices":["Heavy vehicles need larger gaps in traffic than cars","The best way to cross traffic is to pull the vehicle partway across the block one lane while waiting for the other to clear","Heavy vehicles are easy to see; you can count on other drivers to move out of your way or slow down for you"],"answerIndex":0},{"id":99,"question":"What three things add up to the total stopping distance for your truck or bus?","choices":["Attention distance, reaction distance, slowing distance","Observation distance, reaction distance, braking distance","Perception distance, reaction distance, braking distance"],"answerIndex":2},{"id":100,"question":"If you cannot see well with your headlights when driving in an area with few streetlights on a clear night, you should:","choices":["Turn your interior light on","Find another route that is better lit","Use your high beams when legal and keep your interior light off"],"answerIndex":2},{"id":101,"question":"When driving at night, use your low beams when an oncoming vehicle is within ____ feet:","choices":["300","400","500"],"answerIndex":2},{"id":102,"question":"If your brakes get wet while driving on a rainy day, what can happen when you apply the brakes?","choices":["Hydroplaning","Excessive brake wear","Trailer jackknife"],"answerIndex":2},{"id":103,"question":"What is the best advice for drivers to follow when a heavy fog occurs?","choices":["Park at a rest area or truck stop until visibility is better","Do not drive too slowly, or other drivers may hit you","Alternate you low and high beams to improve your vision"],"answerIndex":0},{"id":104,"question":"You are driving on a two-lane road. An oncoming driver drifts into your lane and is headed straight for you. Which of these is the best action to take?","choices":["Brake hard","Steer to the right","Steer onto the left shoulder"],"answerIndex":1},{"id":105,"question":"Which of these is a danger of crossing railroad tracks on dirt roads?","choices":["The ground underneath the tracks may not be stable","You could get hung up halfway across the tracks","Your tires could sink into the dirt and not cross the tracks"],"answerIndex":0},{"id":106,"question":"To avoid a crash, you had to drive onto the right shoulder. You are now driving at 40mph on the shoulder. How should you move back onto the pavement?","choices":["If the shoulder is clear, stay on it until your vehicle comes to a stop then move back onto the pavement when it is safe","Brake hard to slow the vehicle down then steer sharply onto the pavement when it is safe","Keep moving at your present speed and steer very gently back onto the pavement when it is safe"],"answerIndex":0},{"id":107,"question":"You are driving on a straight, level highway at 50mph with no vehicles in front of you. Suddenly, a tire blows out on your vehicle. What should you do first?","choices":["Stay off the brake until the vehicle has slowed down","Begin lightly braking","Begin emergency braking"],"answerIndex":0},{"id":108,"question":"If you need to leave the road in a traffic emergency, you should:","choices":["Try to get all wheels off the pavement","Avoid braking until your speed has dropped to about 20mph","Avoid driving on the shoulder of the road"],"answerIndex":1},{"id":109,"question":"When the hydraulic brakes fail, the system won’t build up pressure and the brake pedal will feel spongy or go to the floor. What action should you take?","choices":["Push down on the brake pedal as hard as you can","Pump the brake pedal to generate pressure","Put the vehicle in neutral and set the parking brake"],"answerIndex":1},{"id":110,"question":"A key principle to remember about loading cargo is to keep the load:","choices":["To the front","To the back","Balanced in the cargo area"],"answerIndex":2},{"id":111,"question":"Containerized loads:","choices":["Should come with their own tie-down devices or locks","Are generally used for freight carried part way by rail or ship","Do not need to be inspected or secured by the driver"],"answerIndex":1},{"id":112,"question":"You are performing a pre-trip inspection on your brakes and suspension system. Which of these statements is true?","choices":["Just one missing leaf spring is not dangerous","Spring hangers that are cracked but still tight are not dangerous","Brake drums should not contain oil or grease on them"],"answerIndex":2},{"id":113,"question":"You are checking your wheels and rims during a pre-trip inspection. Which of these statements is true?","choices":["Rust around wheel nuts may mean they are loose","A vehicle can be safely driven with one missing lug nut on a wheel","Mismatched lock rings can be used on the same vehicle"],"answerIndex":0},{"id":114,"question":"Can federal inspectors inspect your truck or bus?","choices":["Yes, but they cannot put it out of service","Yes, and they can put it out of service","No"],"answerIndex":1},{"id":115,"question":"When starting to move up on a hill from a stop, you should:","choices":["Release the parking brake as you apply engine power","Engage the clutch and accelerate quickly","Keep the trailer brake hand valve applied until you reach 20mph"],"answerIndex":0},{"id":116,"question":"When driving on grades, which of these is the best choice for a safe speed?","choices":["If you have a light load, you can go faster than those with a heavy load","Based on your vehicle and its cargo, select a speed that is safe within the posted speed","Follow the vehicle in front of you"],"answerIndex":1},{"id":117,"question":"Trucks and buses are subject to certain laws, regulations, and restrictions. Which of these statements is true?","choices":["County and city laws do not apply to trucks and buses engaged in interstate commerce","Federal regulations apply only to trucks and buses driven at least 50 miles on a trip","Laws and restrictions can vary from place to place"],"answerIndex":2},{"id":118,"question":"When a doctor prescribes medication for you and knows you will be driving, you should:","choices":["Take the medication but stop taking it if you notice that it is affecting your driving","Take the medication as well as other medications to keep you alert","Ask the doctor if the medication will affect your ability to drive"],"answerIndex":2},{"id":119,"question":"Aggressive driving is:","choices":["Driving a vehicle with the intent to do harm to others","Driving a vehicle when your full attention is not on driving","Driving a vehicle in a selfish, bold, or pushy manner"],"answerIndex":2},{"id":120,"question":"When you are passing another vehicle, pedestrian, or bicyclist, you should assume that they:","choices":["Know you want to pass","See your vehicle","May move into traffic"],"answerIndex":2},{"id":121,"question":"What should you do before driving in a mountain pass?","choices":["Know the escape ramp location on your route","Unhook your steering axle brake","Carry tire chains in your vehicle"],"answerIndex":0},{"id":122,"question":"The Commercial Driver Handbook suggests several things to do when you pass a vehicle. Which of these is not one of them?","choices":["At night, turn on your high beams while you pass the vehicle","Lightly tap your horn, if needed","Assume the other vehicle does not see you"],"answerIndex":0},{"id":123,"question":"If you brake ____ second slower because of a distraction, the chance of a crash doubles.","choices":["1/4","1/2"],"answerIndex":1},{"id":124,"question":"Optional safety equipment may include emergency phone numbers, tire chains, and:","choices":["Fully charged fire extinguisher","Red reflective triangles","Tire changing equipment"],"answerIndex":2},{"id":125,"question":"Which of the following is a good way to react to an aggressive driver?","choices":["Smoke a cigarette to relax","Give the driver the benefit of the doubt","Change the CD or have a snack"],"answerIndex":1},{"id":126,"question":"Which of these statements is not true  should you do when you see a hazard in the roadway?","choices":["Use your 4-way flashers or brake lights to warn others","Swerve around it and get back in your lane","Come to a complete stop until the hazard is clear"],"answerIndex":0},{"id":135,"question":"Which of these statements is true about acceleration?","choices":["Rough acceleration can cause mechanical damage","You should feel a “jerking” motion if you are accelerating your vehicle properly","Using the trailer brake when starting is dangerous"],"answerIndex":0},{"id":136,"question":"The vehicle you are driving has anti-lock brakes if:","choices":["When you turn on the ignition, a yellow ABS malfunction lamp lights up on the instrument panel","The certification is on the driver-side door","Red indicator lamps are on the brake cylinder"],"answerIndex":0},{"id":137,"question":"If you cannot see well with your headlights when driving in an area with few streetlights on a clear night, you should:","choices":["Use your high beams when legal and keep your interior lights off","Turn your interior lights on","Find another route that is better lit"],"answerIndex":0},{"id":138,"question":"The space that is most important to manage around your vehicle is the:","choices":["Back","Front","Sides"],"answerIndex":1},{"id":139,"question":"What happens to the tar on the road pavement during hot weather?","choices":["Nothing, it is made for hot weather","It bleeds, making the road surface slippery","It becomes gummy, making tires stick to the road"],"answerIndex":1},{"id":140,"question":"If you must cross into the oncoming lane as you make a turn, you should:","choices":["Complete your turn without stopping","Back up to allow oncoming traffic to pass","Watch for oncoming traffic"],"answerIndex":2},{"id":141,"question":"If you are not sure how to put out a hazardous material fire, you should:","choices":["Wait for qualified firefighters","Use dirt","Use water"],"answerIndex":0},{"id":142,"question":"Which of the following is el must be shipped under cover"],"answerIndex":0},{"id":149,"question":"You need at least ____ inch tread depth in every major groove of your front tires.","choices":["4/32","6/32","2/32"],"answerIndex":0},{"id":150,"question":"Which of these is not something you should do if your headlights are not working?","choices":["Adjust the headlights","Leave your high beams on","Clean the headlights"],"answerIndex":1},{"id":151,"question":"If you are forced to return to the road before you can stop on the shoulder, you should:","choices":["Use your mirrors and turn signals and turn sharply to get back on the road","Use your mirrors and turn signals and edge gradually back on the road","Drive on the shoulder until the next exit and then re-enter the road"],"answerIndex":1},{"id":152,"question":"When driving in cold weather, your tire’s tread should:","choices":["Provide enough traction to steer and push the vehicle through the snow","Be double the depth required in normal weather","Be checked every 100 miles or every 2 hours"],"answerIndex":2},{"id":153,"question":"How does vehicle weight affect stopping distance?","choices":["Fully loaded trucks take longer to stop","It doesn’t work the same regardless of the vehicle weight","Empty trucks can take longer to stop than loaded trucks"],"answerIndex":0},{"id":154,"question":"The speed which you drive should be determined by your:","choices":["Schedule","Visibility","Engine type"],"answerIndex":1},{"id":155,"question":"Which of these systems should receive extra attention during a winter weather inspection?","choices":["Steering","Suspension","Exhaust"],"answerIndex":2},{"id":156,"question":"Having anti-lock brakes on only the tractor will:","choices":["Increase the likelihood of rear-wheel skid when braking","Decrease the likelihood of rear-wheel skid when braking","Anti-lock brakes should always be on"],"answerIndex":0},{"id":157,"question":"A helper should be used to help back your vehicle:","choices":["Whenever possible","When you have a trailer attached to your vehicle","When you need to back on a curved path"],"answerIndex":0},{"id":158,"question":"A car suddenly cuts in front of you creating a hazard. Which of these actions should you not take?","choices":["Slow down to prevent a crash","Signal and change lanes to avoid the car, if possible","Honk and stay close behind the car"],"answerIndex":2},{"id":159,"question":"If the anti-lock brake system is not working, you should:","choices":["Not drive until it is repaired","Drive at a lower speed","Drive normally, but get the system serviced soon"],"answerIndex":0},{"id":160,"question":"Whenever you double your speed, your vehicle has about ____ times the destructive power if it crashes.","choices":["2","3","4"],"answerIndex":2},{"id":161,"question":"Which of these items is not checked during a pre-trip inspection?","choices":["Amount of fuel in the vehicle","Cargo securement","Whether all vehicle lights are working and clean"],"answerIndex":0},{"id":162,"question":"When you drive in the mountains, you will have to use lower gears to drive safely down grades. Which of these does not affect your choice of gears?","choices":["Tire tread types","Weight of the load","Length of the grade"],"answerIndex":0},{"id":163,"question":"One reason that dry bulk tanks require special care is:","choices":["The load can shift","They can only be filled halfway","They can easily catch fire"],"answerIndex":0},{"id":164,"question":"Which of these statements is true about double-clutching and shifting?","choices":["You can use the tachometer to tell you when to shift","Double-clutching should not be used when the road is slippery","County and city laws do not apply to trucks and buses engaged in interstate commerce"],"answerIndex":0},{"id":165,"question":"A broken exhaust system is dangerous because:","choices":["Exhaust noise will damage the driver’s ears","Toxic fumes and gases could enter the cab or sleeper berth","The leaking exhaust smoke pollutes the air"],"answerIndex":1},{"id":166,"question":"Which of these statements is true about notifying the authorities after a collision occurs?","choices":["An exact location is not necessary, just identify the road and the vehicles involved","If you have a CB radio or cellular phone, use it to notify the police before exiting your vehicle","You should notify the authorities about the collision before doing anything else"],"answerIndex":1},{"id":167,"question":"How can you identify an impaired driver?","choices":["The vehicle is drifting across lanes and moving at variable speeds","The vehicle is weaving in and out of traffic","The vehicle is speeding"],"answerIndex":0},{"id":168,"question":"Backing a commercial vehicle is:","choices":["Not dangerous if you have a helper","Always dangerous","Not dangerous if you do not have to turn"],"answerIndex":1},{"id":169,"question":"Which statement is true about using engine braking?","choices":["Engine braking should not be used as the main way to control speed","It creates extra heat between the brake shoes or pads and the drums or disks","The use of brakes on a downgrade adds to the braking effect of the engine"],"answerIndex":2},{"id":170,"question":"Which incident will cause a truck to have the most difficulty staying in its lane during strong winds?","choices":["Trailer jackknife","Hydroplaning","Excessive brake wear"],"answerIndex":1},{"id":171,"question":"Retarders can be used:","choices":["Only where they are permitted by law","Only for downhill braking","Only on roads with poor traction"],"answerIndex":0},{"id":172,"question":"You must stop on a hill or curve on a two-lane, two-way road. How far back should you place your reflective triangles?","choices":["Within 500ft behind the vehicle","Within 250ft behind the vehicle","As far back as necessary so others can see your vehicle"],"answerIndex":0},{"id":173,"question":"After starting the engine, the:","choices":["Oil pressure gauge should take 3-5 minutes to rise to normal","Coolant temperature gauge should begin a gradual rise to normal","Engine temperature gauge will take 3-5 minutes to rise to normal"],"answerIndex":1},{"id":174,"question":"Which of these is not required knowledge for the driver needing a Hazmat endorsement?","choices":["When to use placards","Which products can be loaded together","Basic chemistry"],"answerIndex":2},{"id":175,"question":"Placards must be:","choices":["Placed on all four sides of the vehicle","Display on all vehicles transporting any amount of hazardous materials","Placed only on the front and rear of the vehicle"],"answerIndex":0},{"id":176,"question":"Which of the following is not a characteristic of a front tire failure?","choices":["Vehicle fishtail","Difficult steering","Steering wheel twisting"],"answerIndex":0},{"id":177,"question":"If you have a heavy load that is slowing you down on an uphill road, you should:","choices":["Drive on the shoulder so others can pass easily","Exit the road until traffic is lighter","Shift into a lower gear"],"answerIndex":2},{"id":178,"question":"When you are parked at the side of the road at night, you must:","choices":["Use your taillights to give warning to other drivers","Put out your emergency warning devices within 30 minutes","Turn on your 4-way emergency flashers to warn others"],"answerIndex":2},{"id":179,"question":"What does emergency braking mean?","choices":["Using the vehicle’s emergency brake","Responding to a hazard by slowing the vehicle","Pushing down on the brake pedal as hard as you can"],"answerIndex":1},{"id":180,"question":"Over-length, over-width, or over-weight loads:","choices":["Must be escorted by police","Can only be driven during daylight hours","Require Caltrans transit permits"],"answerIndex":2},{"id":181,"question":"A pre-trip inspection should be completed:","choices":["At least once a week","If any problems occurred the last time the vehicle was operated","Before operating the vehicle"],"answerIndex":2},{"id":182,"question":"Whi ve used on this trip","Is going to the brake chambers"],"answerIndex":0},{"id":4,"question":"The parking or emergency brake of trucks and buses can be legally held on by ____ pressure.","choices":["Spring","Fluid","Air"],"answerIndex":0},{"id":5,"question":"All air brake equipped vehicles have:","choices":["An air supply pressure gauge","An air use gauge","A back up hydraulic system"],"answerIndex":0},{"id":6,"question":"The stop light switch:","choices":["Turns on the brake lights to warn drivers behind you","Tells you when you need to use your emergency brakes","Tells you when the air brakes system is low on air pressure"],"answerIndex":0},{"id":7,"question":"When you apply the brakes, the brake shoes/linings are pressed against the:","choices":["Brake drum","Slack adjuster","S-cam"],"answerIndex":0},{"id":8,"question":"If your vehicle has an alcohol evaporator, it is there to:","choices":["Rid the wet tank of alcohol that condenses and sits at the bottom","Eliminate the need for daily tank draining","Reduce the risk of ice in air brake valves in cold weather"],"answerIndex":2},{"id":9,"question":"Why should you drain water from compressed air tanks?","choices":["The boiling point reduces braking power","Water can freeze in cold weather and cause brake failure","Water cools the compressor too much"],"answerIndex":1},{"id":10,"question":"If the air pressure does not build up fast enough within the correct amount of time:","choices":["You should be ready to use the parking brake to help stop","The alcohol container may be low","Your air pressure may drop too low during driving"],"answerIndex":2},{"id":11,"question":"The driver must be able to see a warning before air pressure in the service air tanks fall below ____ psi.","choices":["50","55","80"],"answerIndex":1},{"id":12,"question":"The spring brakes used on tractors and straight trucks will bring your truck to a stop when the air pressure drops below ____ psi.","choices":["20","60","100"],"answerIndex":0},{"id":13,"question":"How should you check that your service brakes are working properly?","choices":["Park on slight incline, drain off air pressure, set the parking brakes, and check for movement","Park on level ground, chock the wheels, engage the parking brake, and shut the engine off","Wait for normal air pressure, release the parking brake, move the truck forward slowly, and apply the brake firmly using the brake pedal"],"answerIndex":2},{"id":14,"question":"To check the brake slack on S-cam brakes, you should park on:","choices":["Level ground and apply the parking brakes","Level ground, chock the wheels, and release the parking brakes","A slight grade releases the parking brakes and apply the service brake watching for vehicle movement"],"answerIndex":1},{"id":15,"question":"The air brakes system for a straight truck or bus should not leak at a rate of more than ____ psi per minute with the engine off and the brakes released.","choices":["1","3","2"],"answerIndex":2},{"id":16,"question":"The air loss rate for a straight truck or bus with the engine off and the brakes on should not be more than:","choices":["1 psi in one minute","2 psi in 45 seconds","3 psi in one minute"],"answerIndex":2},{"id":17,"question":"The safety valve is set to automatically reduce pressure at ____ psi.","choices":["50","100","150"],"answerIndex":2},{"id":18,"question":"Air braking takes more time than hydraulic braking because air:","choices":["Brakes use different brake drums","Takes more time to flow through the lines than hydraulic fluid","Brakes require heavier return springs"],"answerIndex":1},{"id":19,"question":"Total stopping distance for vehicles with air brakes is longer than that for vehicles with hydraulic brakes due to ____ distance.","choices":["Brake lag","Reaction","Effective braking"],"answerIndex":0},{"id":20,"question":"With air brake vehicles, the parking brakes should be used:","choices":["Whenever you leave the vehicle unattended","As little as possible","Only during x":2},{"id":30,"question":"The S-cam:","choices":["Controls the flow of air into each of the brake chambers","Pulls the brake shoes away from the drum and allows the wheels to roll freely","Forces the brake shoes against the inside of brake drum"],"answerIndex":2},{"id":31,"question":"The modulating control valve allows you to control the:","choices":["Spring brakes","Front brakes","Amount of air pressure in the brake system"],"answerIndex":0},{"id":32,"question":"If you do not have automatic tank drains, how often should you drain the oil and water from the bottom of compressed air storage air tanks?","choices":["After every 4 hours of service","At the end of each day of driving","Once a week"],"answerIndex":1},{"id":33,"question":"Some air brake systems have an alcohol evaporator. What may happen if you don’t keep the unit filled with alcohol?","choices":["The S-cam may not rotate back when you release the brake pedal","Ice may form in the air storage tanks and cause the brakes to fail","Ice may form on the brake drums and warp them"],"answerIndex":1},{"id":34,"question":"What is the first and most important thing you should do when a low air pressure warning comes on?","choices":["Stop and safely park as soon as possible","Adjust the brake pedal for more travel","Open the air supply control valve"],"answerIndex":0},{"id":35,"question":"If your truck has a dual air brake system and one of the systems is low on pressure:","choices":["The brake drums will not be fully pressurized","Either the front or rear brakes will not be fully operational","The manual slack adjusters on the S-cam brake are not set properly"],"answerIndex":1},{"id":36,"question":"Under normal conditions, to engage the parking brake the driver must first:","choices":["Turn off the engine","Let the air out of the spring brakes","Be sure that the air brake system is fully pressurized"],"answerIndex":1},{"id":37,"question":"Before driving a truck or bus with a dual brake system, the pressure in each rvice brakes being in adjustment","Is not affected by the condition of the service brakes","Can only be tested by highly trained brake service people"],"answerIndex":0},{"id":45,"question":"Which of these is not a proper time to apply the parking brakes?","choices":["When your brakes are very hot","When you will only be stopped for less than 1 hour","When you are going to test the parking brake"],"answerIndex":0},{"id":46,"question":"When is it OK to leave your truck unattended without applying the parking brake or chocking the wheels?","choices":["Never","If you will only be away from the truck for a few minutes","If you are conducting a pre-trip inspection"],"answerIndex":0},{"id":47,"question":"The proper method of braking when going down long and/or steep grades after selecting the proper gear is to brake until your speed is about ____ mph below your “safe” speed then release your brakes.","choices":["5","10","15"],"answerIndex":0},{"id":48,"question":"During normal driving, spring brakes are usually held back by:","choices":["Bolts","Air pressure","Spring pressure"],"answerIndex":1},{"id":49,"question":"The most common type of foundation brake found on heavy vehicles is the:","choices":["Wedge drum","S-cam drum","Disc brake"],"answerIndex":1},{"id":50,"question":"The air compressor governor controls:","choices":["When air is pumped into the air storage tanks","The speed of the air compressor","Air pressure applied to the brakes"],"answerIndex":0},{"id":51,"question":"A supply pressure gauge tells you how much pressure is in the:","choices":["Air tanks","Tractor brake lines","Trailer brake lines"],"answerIndex":0},{"id":52,"question":"Why drain water from compressed air tanks?","choices":["The low boiling point of water reduces braking power","Water can freeze in cold weather and cause brake failure","To keep from fouling the air compressor oil"],"answerIndex":1},{"id":53,"question":"Repeatedly pressing and releasing (fanning) the brake pedal may result in:","ch ":0}]},"combo":{"label":"Combinations","short":"Combinations","testSize":20,"passNeeded":16,"questions":[{"id":1,"question":"There are 2 things that can prevent a rollover. They are: 1) Keep the cargo as close to the ground as possible and 2):","choices":["Make sure the brakes are properly adjusted","Keep both hands firmly on the steering wheel","Go slow around turns"],"answerIndex":2},{"id":2,"question":"The best way to tell if your trailer has started to skid is to:","choices":["Hear the wheels skidding","See it in your mirrors","Feel for “pulling” in the cab"],"answerIndex":1},{"id":3,"question":"Which of these vehicles off-track the most?","choices":["A 5-axle tractor towing a 52ft trailer","A 5-axle tractor towing a 45ft trailer","A 5-axle tractor towing a 42ft trailer"],"answerIndex":0},{"id":4,"question":"A tractor with a(n) ____ trailer requires the shortest stopping distance.","choices":["Empty","Lightly loaded","Fully loaded"],"answerIndex":2},{"id":5,"question":"A trailer is most likely to jackknife when it is:","choices":["Loaded to full capacity","Over loaded","Empty"],"answerIndex":2},{"id":6,"question":"Under good driving conditions, you should leave at least 1 second of space between your vehicle and the vehicle ahead for every ____ ft of your vehicle’s length","choices":["10","20","30"],"answerIndex":0},{"id":7,"question":"If you have coupled with a semi-trailer, where should the front trailer supports be before driving away?","choices":["Raised 1/2 way, the crank handle secured in its bracket","Raised 3/4 way, the crank handle removed","Fully raised with the crank handle secured in its bracket"],"answerIndex":2},{"id":8,"question":"The fifth wheel locking lever is not locked after the jaws close around the kingpin. That means:","choices":["The trailer will not swivel on the fifth wheel","The parking lock is off and may drive away","The coupling is not right and should be fixed before driving the coupled unit"],"answerIndex":2},{"id":9,"question":"You should not back a tractor under a trailer until the whole air system is:","choices":["Empty","At normal pressure","Between 60 and 80 psi"],"answerIndex":1},{"id":10,"question":"You are coupling a semi-trailer to your tractor but have not backed under it. The trailer is at the right height when:","choices":["The kingpin is about 1-1/4 inches above the fifth wheel","The end of the kingpin is even with the top of the fifth wheel","It is raised slightly when the tractor is backed under it"],"answerIndex":2},{"id":11,"question":"Glad hands are used to connect the:","choices":["Electric lines from the truck to the trailer","Kingpin from the tractor to the locking jaws on the glide plate","Service and emergency air lines from the truck to the trailer"],"answerIndex":2},{"id":12,"question":"When checking that the trailer is securely coupled to the tractor, the landing gear should be:","choices":["Fully raised","Slightly raised","Fully lowered"],"answerIndex":1},{"id":13,"question":"When you are uncoupling a loaded trailer, lower the landing gear until it:","choices":["Makes firm contact with the ground","Makes contact with the ground and lifts the trailer off of the fifth wheel","Just reaches the ground"],"answerIndex":0},{"id":14,"question":"You want to inspect the trailer supports. You should place the tractor transmission in which gear after you have uncoupled the trailer?","choices":["Low reverse","Neutral","High reverse"],"answerIndex":1},{"id":15,"question":"How much space should be between the upper and lower fifth wheel after coupling?","choices":["About 1/4 inch","Just enough to see light through it","None"],"answerIndex":2},{"id":16,"question":"Which part of the kingpin should the locking jaws close around?","choices":["The shank","The head","The base"],"answerIndex":0},{"id":17,"question":"The front trailer supports are up and the trailer is resting on the tractor. Make sure:","choices":["There is enough clearance between the upper and lower fifth wheel","The safety latch is in the unlocked position","There is enough clearance between the tractor frame and the landing gear"],"answerIndex":2},{"id":18,"question":"When checking the trailer’s emergency brakes, the tractor protection control valve should be placed in the ____ position.","choices":["Normal","Emergency","Neutral"],"answerIndex":1},{"id":19,"question":"Compared to a straight truck or bus, there are ____ things to inspect on a combination vehicle.","choices":["Fewer","The same number of","More"],"answerIndex":2},{"id":20,"question":"Which statement is true?","choices":["The brake and suspension systems of combination vehicles work best with a light load","Light vehicles need more braking power to stop than heavy vehicles","“Bobtail” tractors can take longer to stop than a combination vehicle loaded to its maximum gross weight"],"answerIndex":2},{"id":21,"question":"To stop a trailer skid, you should:","choices":["Use the trailer hand brake","Release the brakes","Counter steer"],"answerIndex":1},{"id":22,"question":"In general, the higher your truck’s “center of gravity” the:","choices":["Easier it is to turn around corners","More stable it is when turning","Easier it is to turn over"],"answerIndex":2},{"id":23,"question":"If you cannot make a turn without entering another traffic lane, you should:","choices":["Turn wide before you start your turn","Turn wide as you complete your turn","Not make that turn"],"answerIndex":1},{"id":24,"question":"You are coupling a tractor to a semi-trailer. You have backed up but are not under it. What should you hook up before backing under the semi-trailer?","choices":["The emergency and service air lines","The electrical service cable","Nothing, back up and lock the fifth wheel"],"answerIndex":0},{"id":25,"question":"For a coupling to be completed, the safety latch for the fifth wheel locking lever must be:","choices":["Over the locking lever","Straight up","Through the locking lever"],"answerIndex":0},{"id":26,"question":"Before you back under a trailer, make sure the:","choices":["Trailer brakes are locked","Air supply knob is in","Air brakes are off"],"answerIndex":0},{"id":27,"question":"After you connect the air lines but before you back under the trailer, you should:","choices":["Supply air to the trailer system, then pull out the air supply knob","Make sure the trailer brakes are off","Walk around the rig to be sure it is clear"],"answerIndex":0},{"id":28,"question":"To unlock the fifth wheel, put the release handle to the ____ position.","choices":["Open","Neutral","Closed"],"answerIndex":0},{"id":29,"question":"When coupling, the proper position of the fifth wheel is:","choices":["Level with the ground","Tilted up towards the end of the tractor","Tilted down towards the end of the tractor"],"answerIndex":2},{"id":30,"question":"You are uncoupling a trailer. After you shut off the trailer air supply and lock the trailer brakes, you should:","choices":["Back up gently to ease pressure on the fifth wheel locking jaws","Begin to lower the trailer landing gear","Immediately put on your tractor parking brakes"],"answerIndex":0},{"id":31,"question":"When should you use chocks to park a trailer not equipped with spring brakes?","choices":["Never","Always","Only when it will be parked on an incline"],"answerIndex":1},{"id":32,"question":"After you lock the kingpin into the fifth wheel, you should check the connection by pulling:","choices":["Forward 50ft, turning right, then left","The tractor ahead sharply to release the trailer brakes","The tractor ahead gently with the trailer brakes locked"],"answerIndex":2},{"id":33,"question":"Why should you be sure that the fifth wheel plate is greased as required?","choices":["To ensure good electrical connections","To prevent steering problems","To reduce heat and noise"],"answerIndex":1},{"id":34,"question":"Air and electric lines from the tractor to the trailer should be:","choices":["Pulled tight with very little slack","Secured but with enough slack for turns","Resting on the frame of the tractor"],"answerIndex":1},{"id":35,"question":"When you get ready to back under a semi-trailer, you should line up:","choices":["The kingpin with the edge of the driver’s side locking jaw","Directly in front of the trailer","The left rear outside dual wheel with the kingpin"],"answerIndex":1},{"id":36,"question":"After the trailer has been coupled to the tractor, the tractor protection control valve should be placed in the ____ position.","choices":["Down","Up","Normal"],"answerIndex":2},{"id":37,"question":"After you have coupled the trailer, you should begin raising the landing gear by using the ____ gear.","choices":["Low","Mid-level","High"],"answerIndex":0},{"id":38,"question":"When backing a tractor under a trailer, you should:","choices":["Always use the lowest reverse gear","Always approach the trailer at a slight angle","Do it quickly to ensure that the kingpin is locked"],"answerIndex":0},{"id":39,"question":"After you supply air to the trailer, make sure the air lines are not crossed and the trailer brakes are working. You do this by:","choices":["Turning on the parking brakes from the cab","Watching your mirrors to see if the trailer lights come on","Applying/releasing the trailer brakes and listening for brake sounds"],"answerIndex":2},{"id":40,"question":"What should you do if your trailer’s anti-lock braking system is not working?","choices":["Drive at a lower speed and get the system serviced soon","Drive normally, but get the system serviced soon","Do not drive until the system is repaired"],"answerIndex":1},{"id":41,"question":"You should not back a tractor under a trailer until the whole air system is:","choices":["At normal pressure","Empty","Between 60 and 80 psi"],"answerIndex":0},{"id":42,"question":"To prevent a jackknife in normal driving, some drivers use the hand valve before stepping on the brake pedal. Which of the following statements is true?","choices":["True, it is the best way to brake and keep the truck in a straight line","True, it results in less skidding than using the brake pedal alone","False, it should never be done"],"answerIndex":2},{"id":43,"question":"After you lock the kingpin into the fifth wheel, you should check the connection by pulling:","choices":["Forward 50ft, turning right, then left","The tractor ahead sharply to release the trailer brakes","The tractor ahead gently with the trailer brakes locked"],"answerIndex":2},{"id":44,"question":"A tractor-trailer vehicle combination is most likely to roll over during a turn when the configuration includes:","choices":["Double 45ft trailer","Triple 27ft trailer","Combo 45 and 27ft trailers"],"answerIndex":1},{"id":45,"question":"How should you test the tractor semi-trailer connection for security?","choices":["Put the tractor into gear and pull ahead with a sharp jerk","Pull gently forward in low gear against the locked trailer brakes then look at it carefully","Rock the trailer back and forth with the trailer brakes locked"],"answerIndex":1},{"id":46,"question":"You supply air to the trailer tanks by:","choices":["Connecting the blue line to the red line","Pushing in the trailer air supply valve","Pulling out the trailer air supply valve"],"answerIndex":1},{"id":47,"question":"You have a major leak in the service line and you put on the brakes. Service air pressure will escape and cause the:","choices":["Trailer emergency brakes to come on","Tractor spring brakes to lock on","Trailer tank pressure to be lost"],"answerIndex":0},{"id":48,"question":"After connecting the air lines but before backing under the trailer, you should:","choices":["Make sure the trailer brakes are off","Supply air to the trailer system then pull out the air supply","Walk around the rig to be sure it is clear"],"answerIndex":1},{"id":49,"question":"The air leakage rate for a combination vehicle (engine off, brakes on) should not be more than ____ psi per minute.","choices":["4","2","3"],"answerIndex":2},{"id":   function setError(text) {
    if (!text) { errorBox.style.display='none'; errorBox.textContent=''; return; }
    errorBox.style.display='block';
    errorBox.textContent='Error: ' + text;
  }

  function rand() {
    rngState |= 0;
    rngState ^= rngState << 13;
    rngState ^= rngState >>> 17;
    rngState ^= rngState << 5;
    return ((rngState >>> 0) / 4294967296);
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getCfg() {
    return DATA[bankKey];
  }

  function saveState() {
    state[bankKey] = {
      testQuestions: testQuestions,
      idx: idx,
      answered: answered,
      correct: correct,
      locked: locked,
      seed: seed
    };
  }

  function loadState(key) {
    const s = state[key];
    if (!s || !s.testQuestions || !s.testQuestions.length) return false;
    testQuestions = s.testQuestions;
    idx = s.idx;
    answered = s.answered;
    correct = s.correct;
    locked = s.locked;
    seed = s.seed;
    rngState = seed;
    return true;
  }

    const activeMap = {
      general: tGeneral,
      air: tAir,
      combo: tCombo,
      hazmat: tHazmat,
      doubles: tDoubles,
      tanker: tTanker
    };
    allSwitchButtons.forEach(btn => btn.classList.remove('active'));
    const active = activeMap[bankKey];
    if (active) active.classList.add('active');
  }

  function buildTest() {
    const cfg = getCfg();
    seed = Math.floor(Math.random() * 2147483647);
    rngState = seed;
    const pool = shuffle(cfg.questions);
    testQuestions = pool.slice(0, Math.min(cfg.testSize, pool.length));
    while (testQuestions.length < cfg.testSize) {
      testQuestions = testQuestions.concat(shuffle(cfg.questions)).slice(0, cfg.testSize);
    }
    idx = 0;
    answered = 0;
    correct = 0;
    locked = false;
    saveState();
    updateDescription();
    updateMeta();
    renderQuestion();
  }

  function renderQuestion() {
    setError('');
    const q = testQuestions[idx];
    if (!q) {
      qText.textContent = 'Loading...';
      choicesWrap.innerHTML = '';
      return;
    }
    nextBtn.disabled = true;
    nextBtn.classList.remove('enabled');
    msg.textContent = 'Select an answer.';
    qText.textContent = q.question || '';

    if (q.image) {
      qImg.src = q.image;
      qImg.style.display = 'block';
    } else {
      qImg.removeAttribute('src');
      qImg.style.display = 'none';
    }

    const labeled = q.choices.map((t, i) => ({ text: t, isCorrect: i === q.answerIndex }));
    const shuffled = shuffle(labeled);

    choicesWrap.innerHTML = '';
    shuffled.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.type = 'button';
      const letter = String.fromCharCode(65 + i);
      btn.textContent = `${letter}. ${c.text}`;
      btn.addEventListener('click', () => onPick(i, c.isCorrect, shuffled));
      choicesWrap.appendChild(btn);
    });

    if (locked) {
      const buttons = Array.from(choicesWrap.querySelectorAll('button'));
      buttons.forEach(b => b.disabled = true);
      nextBtn.disabled = false;
      nextBtn.classList.add('enabled');
    }
    updateMeta();
  }

  function onPick(pickIndex, isCorrect, shuffled) {
    if (locked) return;
    locked = true;
    answered++;
    const buttons = Array.from(choicesWrap.querySelectorAll('button'));
    buttons.forEach(b => b.disabled = true);

    if (isCorrect) {
      correct++;
      buttons[pickIndex].classList.add('correct');
      msg.textContent = 'Correct.';
    } else {
      buttons[pickIndex].classList.add('wrong');
      const correctIdx = shuffled.findIndex(x => x.isCorrect);
      if (correctIdx >= 0) buttons[correctIdx].classList.add('correct');
      msg.textContent = 'Wrong.';
    }

    nextBtn.disabled = false;
    nextBtn.classList.add('enabled');
    saveState();

    const cfg = getCfg();
    const maxPossible = correct + (cfg.testSize - answered);
    if (maxPossible < cfg.passNeeded) {
      msg.textContent = `Stopped: impossible to finish with ${cfg.passNeeded}/${cfg.testSize}.`;
      nextBtn.disabled = true;
      nextBtn.classList.remove('enabled');
    }
  }

  function switchBank(to) {
    saveState();
    bankKey = to;
    setToggleUI();
    updateDescription();
    if (!loadState(bankKey)) {
      buildTest();
      return;
    }
    updateMeta();
    renderQuestion();
  }

  tGeneral.addEventListener('click', () => switchBank('general'));
  tAir.addEventListener('click', () => switchBank('air'));
  tCombo.addEventListener('click', () => switchBank('combo'));
  tHazmat.addEventListener('click', () => switchBank('hazmat'));
  tDoubles.addEventListener('click', () => switchBank('doubles'));
  tTanker.addEventListener('click', () => switchBank('tanker'));


  newTestBtn.addEventListener('click', () => buildTest());

  nextBtn.addEventListener('click', () => {
    if (nextBtn.disabled) return;
    const cfg = getCfg();
    if (idx < cfg.testSize - 1) {
      idx++;
      locked = false;
      saveState();
      renderQuestion();
    } else {
      locked = true;
      nextBtn.disabled = true;
      nextBtn.classList.remove('enabled');
      const pct = Math.round((correct / cfg.testSize) * 100);
      msg.textContent = `Finished: ${correct}/${cfg.testSize} (${pct}%).`;
      saveState();
    }
  });

  switchBank('general');

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
        }
      } catch (e) {}
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>
